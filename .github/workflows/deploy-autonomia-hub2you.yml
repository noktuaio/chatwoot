name: Deploy Autonomia Chatwoot to AWS hub2you

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      aws_role_arn:
        description: GitHub Actions deploy role ARN from Terraform output
        required: false
        default: arn:aws:iam::354307071110:role/chatwoot-autonomia-prod-github-actions-deploy
        type: string
      aws_region:
        description: AWS region
        required: false
        default: us-east-1
        type: string
      ecr_repository:
        description: ECR repository name
        required: false
        default: chatwoot-autonomia-prod
        type: string
      ec2_instance_id:
        description: Chatwoot EC2 instance ID from Terraform output
        required: false
        default: i-059ee08d626ddc5fa
        type: string
      ec2_alb_dns_name:
        description: Chatwoot EC2 ALB DNS name from Terraform output
        required: false
        default: chatwoot-autonomia-prod-ec2-741519072.us-east-1.elb.amazonaws.com
        type: string
      domain_name:
        description: Public product domain configured for this environment
        required: false
        default: chat.hub2you.ai
        type: string
      ssm_runtime_image_parameter:
        description: SSM parameter that stores the runtime image URI
        required: false
        default: /chatwoot/prod/runtime-image
        type: string
      stable_image_tag:
        description: Stable ECR tag
        required: false
        default: autonomia-custom-image-port-ee
        type: string

concurrency:
  group: deploy-autonomia-aws-hub2you
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  AWS_ROLE_ARN: ${{ github.event.inputs.aws_role_arn || 'arn:aws:iam::354307071110:role/chatwoot-autonomia-prod-github-actions-deploy' }}
  ECR_REPOSITORY: ${{ github.event.inputs.ecr_repository || 'chatwoot-autonomia-prod' }}
  EC2_INSTANCE_ID: ${{ github.event.inputs.ec2_instance_id || 'i-059ee08d626ddc5fa' }}
  EC2_ALB_DNS_NAME: ${{ github.event.inputs.ec2_alb_dns_name || 'chatwoot-autonomia-prod-ec2-741519072.us-east-1.elb.amazonaws.com' }}
  DOMAIN_NAME: ${{ github.event.inputs.domain_name || 'chat.hub2you.ai' }}
  SSM_RUNTIME_IMAGE_PARAMETER: ${{ github.event.inputs.ssm_runtime_image_parameter || '/chatwoot/prod/runtime-image' }}
  STABLE_IMAGE_TAG: ${{ github.event.inputs.stable_image_tag || 'autonomia-custom-image-port-ee' }}

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Chatwoot image
        run: |
          sed -i 's|FROM node:24-alpine as node|FROM public.ecr.aws/docker/library/node:24-alpine as node|' docker/Dockerfile
          sed -i 's|FROM ruby:3.4.4-alpine3.21|FROM public.ecr.aws/docker/library/ruby:3.4.4-alpine3.21|g' docker/Dockerfile
          echo 'ENV CW_EDITION="ee"' >> docker/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.STABLE_IMAGE_TAG }}
          cache-from: type=gha,scope=chatwoot-autonomia-hub2you-linux-amd64
          cache-to: type=gha,mode=max,scope=chatwoot-autonomia-hub2you-linux-amd64

      - name: Deploy image to EC2
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws ssm put-parameter \
            --name "$SSM_RUNTIME_IMAGE_PARAMETER" \
            --type String \
            --value "$IMAGE_URI" \
            --overwrite

          command_id=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[\"sudo /opt/chatwoot/deploy.sh '$IMAGE_URI'\"]" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json

      - name: Verify public SSO redirect
        run: |
          for attempt in $(seq 1 18); do
            headers=$(curl -k -sS -I --max-time 10 \
              --connect-to "${DOMAIN_NAME}:443:${EC2_ALB_DNS_NAME}:443" \
              "https://${DOMAIN_NAME}/auth/autonomia" || true)
            status=$(printf '%s\n' "$headers" | awk 'NR == 1 {print $2}')
            location=$(printf '%s\n' "$headers" | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')

            if [ -n "$location" ] \
              && printf '%s\n' "$location" | grep -F 'client_id=chat2you' \
              && printf '%s\n' "$location" | grep -F "redirect_uri=https%3A%2F%2F${DOMAIN_NAME}%2Fauth%2Fautonomia%2Fcallback"; then
              echo "$location"
              exit 0
            fi

            echo "Attempt $attempt: status=${status:-none} location=${location:-none}"
            sleep 10
          done

          echo "SSO redirect smoke test failed"
          exit 1
