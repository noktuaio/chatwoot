name: Deploy Autonomia Chatwoot to AWS hub2you

on:
  workflow_dispatch:
    inputs:
      aws_role_arn:
        description: GitHub Actions deploy role ARN from Terraform output
        required: true
        type: string
      aws_region:
        description: AWS region
        required: true
        default: us-east-1
        type: string
      ecr_repository:
        description: ECR repository name
        required: true
        default: chatwoot-autonomia-prod
        type: string
      ec2_instance_id:
        description: Chatwoot EC2 instance ID from Terraform output
        required: true
        type: string
      ec2_alb_dns_name:
        description: Chatwoot EC2 ALB DNS name from Terraform output
        required: true
        type: string
      domain_name:
        description: Public product domain configured for this environment
        required: true
        type: string
      ssm_runtime_image_parameter:
        description: SSM parameter that stores the runtime image URI
        required: true
        default: /chatwoot/prod/runtime-image
        type: string
      stable_image_tag:
        description: Stable ECR tag
        required: true
        default: autonomia-custom-image-port-ee
        type: string

concurrency:
  group: deploy-autonomia-aws-hub2you
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Chatwoot image
        run: |
          sed -i 's|FROM node:24-alpine as node|FROM public.ecr.aws/docker/library/node:24-alpine as node|' docker/Dockerfile
          sed -i 's|FROM ruby:3.4.4-alpine3.21|FROM public.ecr.aws/docker/library/ruby:3.4.4-alpine3.21|g' docker/Dockerfile
          echo 'ENV CW_EDITION="ee"' >> docker/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.stable_image_tag }}
          cache-from: type=gha,scope=chatwoot-autonomia-hub2you-linux-amd64
          cache-to: type=gha,mode=max,scope=chatwoot-autonomia-hub2you-linux-amd64

      - name: Deploy image to EC2
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}
        run: |
          aws ssm put-parameter \
            --name "${{ inputs.ssm_runtime_image_parameter }}" \
            --type String \
            --value "$IMAGE_URI" \
            --overwrite

          command_id=$(aws ssm send-command \
            --instance-ids "${{ inputs.ec2_instance_id }}" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[\"sudo /opt/chatwoot/deploy.sh '$IMAGE_URI'\"]" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "${{ inputs.ec2_instance_id }}"

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ inputs.ec2_instance_id }}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json

      - name: Verify public SSO redirect
        run: |
          for attempt in $(seq 1 18); do
            headers=$(curl -k -sS -I --max-time 10 \
              --connect-to "${{ inputs.domain_name }}:443:${{ inputs.ec2_alb_dns_name }}:443" \
              "https://${{ inputs.domain_name }}/auth/autonomia" || true)
            status=$(printf '%s\n' "$headers" | awk 'NR == 1 {print $2}')
            location=$(printf '%s\n' "$headers" | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')

            if [ -n "$location" ] \
              && printf '%s\n' "$location" | grep -F 'client_id=talkai' \
              && printf '%s\n' "$location" | grep -F "redirect_uri=https%3A%2F%2F${{ inputs.domain_name }}%2Fauth%2Fautonomia%2Fcallback"; then
              echo "$location"
              exit 0
            fi

            echo "Attempt $attempt: status=${status:-none} location=${location:-none}"
            sleep 10
          done

          echo "SSO redirect smoke test failed"
          exit 1
