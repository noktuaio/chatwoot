name: Deploy Autonomia Chatwoot to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-autonomia-aws-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: '140023375763'
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::140023375763:role/chatwoot-autonomia-prod-github-actions-deploy
  ECR_REPOSITORY: chatwoot-autonomia-prod
  EC2_INSTANCE_ID: i-0c12f13722ad4e78c
  EC2_ALB_DNS_NAME: chatwoot-autonomia-prod-ec2-1353010243.us-east-1.elb.amazonaws.com
  SSM_RUNTIME_IMAGE_PARAMETER: /chatwoot/prod/runtime-image
  STABLE_IMAGE_TAG: autonomia-custom-image-port-ce

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Chatwoot CE image
        run: |
          rm -rf enterprise spec/enterprise
          sed -i 's|FROM node:24-alpine as node|FROM public.ecr.aws/docker/library/node:24-alpine as node|' docker/Dockerfile
          sed -i 's|FROM ruby:3.4.4-alpine3.21|FROM public.ecr.aws/docker/library/ruby:3.4.4-alpine3.21|g' docker/Dockerfile
          echo 'ENV CW_EDITION="ce"' >> docker/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.STABLE_IMAGE_TAG }}
          cache-from: type=gha,scope=chatwoot-autonomia-prod-linux-amd64
          cache-to: type=gha,mode=max,scope=chatwoot-autonomia-prod-linux-amd64

      - name: Deploy image to EC2
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws ssm put-parameter \
            --name "$SSM_RUNTIME_IMAGE_PARAMETER" \
            --type String \
            --value "$IMAGE_URI" \
            --overwrite

          command_id=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[\"sudo /opt/chatwoot/deploy.sh '$IMAGE_URI'\"]" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json

      - name: Verify public SSO redirect
        run: |
          for attempt in $(seq 1 18); do
            headers=$(curl -k -sS -I --max-time 10 \
              --connect-to "agents.autonomia.site:443:${EC2_ALB_DNS_NAME}:443" \
              https://agents.autonomia.site/auth/autonomia || true)
            status=$(printf '%s\n' "$headers" | awk 'NR == 1 {print $2}')
            location=$(printf '%s\n' "$headers" | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')

            if [ -n "$location" ] \
              && printf '%s\n' "$location" | grep -F 'client_id=talkai' \
              && printf '%s\n' "$location" | grep -F 'redirect_uri=https%3A%2F%2Fagents.autonomia.site%2Fauth%2Fautonomia%2Fcallback'; then
              echo "$location"
              exit 0
            fi

            echo "Attempt $attempt: status=${status:-none} location=${location:-none}"
            sleep 10
          done

          echo "SSO redirect smoke test failed"
          exit 1
