name: Force CRM AI Exchange Rate Refresh

# One-purpose ops tool: runs Crm::Ai::ExchangeRate.refresh! inside the running
# web container on the active (current) instance of each prod stack via SSM.
# Populates the USD->BRL cache immediately (otherwise the hourly cron at :05
# does it). The command is hardcoded and idempotent — no arbitrary input.

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Which stack(s) to refresh.
        required: true
        default: both
        type: choice
        options:
          - both
          - autonomia
          - hub2you

permissions:
  id-token: write
  contents: read

jobs:
  refresh:
    name: Refresh ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: autonomia
            role_arn: arn:aws:iam::140023375763:role/chatwoot-autonomia-prod-github-actions-deploy
          - name: hub2you
            role_arn: arn:aws:iam::354307071110:role/chatwoot-autonomia-prod-github-actions-deploy
    env:
      AWS_REGION: us-east-1
      CURRENT_INSTANCE_PARAMETER: /chatwoot/prod/blue-green/current-instance-id
    steps:
      - name: Skip when stack not selected
        id: gate
        run: |
          if [ "${{ github.event.inputs.stack }}" = "both" ] || [ "${{ github.event.inputs.stack }}" = "${{ matrix.name }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Stack ${{ matrix.name }} not selected; skipping."
          fi

      - name: Configure AWS credentials
        if: steps.gate.outputs.run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run exchange rate refresh on active instance
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail

          INSTANCE_ID="$(aws ssm get-parameter \
            --name "$CURRENT_INSTANCE_PARAMETER" \
            --query 'Parameter.Value' --output text)"
          echo "Active instance: $INSTANCE_ID"

          CMD='docker exec chatwoot-web bundle exec rails runner "puts %([force-refresh] ) + Crm::Ai::ExchangeRate.refresh!.inspect"'

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name 'AWS-RunShellScript' \
            --comment 'Force CRM AI exchange rate refresh' \
            --parameters "commands=[$(printf '%s' "$CMD" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')]" \
            --query 'Command.CommandId' --output text)"
          echo "SSM command: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)"
          echo "Status: $STATUS"

          echo "----- stdout -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text

          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command did not succeed (status=$STATUS)"
            exit 1
          fi
